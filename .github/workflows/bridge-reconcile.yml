name: bridge reconcile (optional)

# Polices the issues against the governing documents: anything without a
# matching approved item gets labelled and alerted, and a pinned Scope report
# stays current. Dormant until BRIDGE_ENABLED is 'true'.
on:
  issues:
    types: [opened, reopened, edited]
  schedule:
    - cron: "37 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  reconcile:
    if: vars.BRIDGE_ENABLED == 'true' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
      - name: Reconcile issues against the documents
        env:
          GH_TOKEN: ${{ github.token }}
        run: docassert bridge reconcile --repo "$GITHUB_REPOSITORY"
